<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE WEAR | ហាងខោអាវលំដាប់ពិភពលោក</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Freehand&family=Hanuman:wght@300;400;700&display=swap');
        body { font-family: 'Hanuman', serif; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1441997629053-7551489668e2?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; }
    </style>
    <script>
    let count = 0;
    const cartBadge = document.querySelector('.relative span'); // ចាប់យកលេខនៅលើកន្ត្រក

    function addToCart() {
        count++;
        cartBadge.innerText = count;
        
        // បន្ថែម Effect លោតតិចៗពេលចុច
        cartBadge.classList.add('scale-125', 'bg-green-500');
        setTimeout(() => {
            cartBadge.classList.remove('scale-125', 'bg-green-500');
        }, 200);

        alert("បានបន្ថែមទំនិញទៅក្នុងកន្ត្រក!");
    }
</script>
</head>
    <body>
        <h1 style="color: darkred;" size="7">សូមស្វាគម្នន៍ មកកានហាង</h1>
        <h1></h1>

         
                    

    </body>
</html>
